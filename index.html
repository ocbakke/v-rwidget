<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarpsborg Værrigg</title>
    <!-- Tailwind CSS for styling (raskt og responsivt) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide ikoner for stilrene værsymboler -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Litt ekstra styling for animasjoner */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        
        /* Gjør at utbrettingsmenyen glir pent */
        .forecast-dropdown {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }
        .forecast-dropdown.open {
            grid-template-rows: 1fr;
        }
        .forecast-inner {
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4 overflow-hidden">

    <!-- Selve Værriggen start -->
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 w-full max-w-md overflow-hidden font-sans">
        
        <!-- Topptekst med SA-logo -->
        <div class="bg-white border-b-4 border-[#e3000f] px-6 py-4">
            <div class="flex justify-between items-center">
                <!-- Fallback-logo i SVG -->
                <img src="sa.svg" alt="Sarpsborg Arbeiderblad" class="h-9" onerror="this.outerHTML='<svg viewBox=\'0 0 80 40\' class=\'h-9\' xmlns=\'http://www.w3.org/2000/svg\'><text x=\'0\' y=\'32\' font-family=\'Georgia, serif\' font-weight=\'900\' font-size=\'38\' fill=\'#e3000f\'>S</text><text x=\'24\' y=\'32\' font-family=\'Georgia, serif\' font-weight=\'900\' font-size=\'44\' fill=\'#e3000f\'>a</text><circle cx=\'62\' cy=\'30\' r=\'5\' fill=\'#1e293b\'/></svg>'">
                
                <div class="flex items-center text-[#e3000f]">
                    <i data-lucide="cloud-sun" class="w-5 h-5 mr-1.5"></i>
                    <h2 class="text-sm font-bold tracking-wider text-gray-800 uppercase">Været akkurat nå</h2>
                </div>
            </div>
            <p class="text-gray-500 text-xs mt-1.5 font-medium" id="time-display">Henter lokasjoner...</p>
        </div>

        <!-- Hovedinnhold (Laster) -->
        <div id="loading-state" class="p-8 text-center text-gray-500">
            <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin-slow mb-3 text-[#e3000f]"></i>
            <p>Henter ferske værdata for ulike områder...</p>
        </div>

        <!-- Liste med områder (Data) - Skjult som standard -->
        <div id="weather-list" class="hidden flex flex-col divide-y divide-gray-100">
            <!-- Innholdet genereres dynamisk av JavaScript -->
        </div>

        <!-- Kildehenvisning (Påkrevd av Yr/MET) -->
        <div class="px-6 py-3 bg-gray-50 text-xs text-gray-400 text-center border-t border-gray-200">
            Værvarsel fra <a href="https://www.yr.no/nb/værvarsel/daglig-tabell/1-105152/Norge/Østfold/Sarpsborg/Sarpsborg" target="_blank" class="text-[#e3000f] font-medium hover:underline">Yr</a>, levert av Meteorologisk institutt og NRK.
        </div>
    </div>
    <!-- Selve Værriggen slutt -->

    <script>
        // Initialiserer ikonene
        lucide.createIcons();

        // Disse verdiene byttes automatisk ut av GitHub Actions når siden publiseres
        const frostId = '{{FROST_ID}}';
        const frostSecret = '{{FROST_SECRET}}';

        // Fysiske målestasjoner
        const stations = [
            { id: 'SN3190', name: 'Sarpsborg sentrum', lat: 59.2851, lon: 11.1128 },
            { id: 'SN3370', name: 'Kalnes', lat: 59.3193, lon: 11.0422 },
            { id: 'SN3003', name: 'E6 Solbergtårnet', lat: 59.2046, lon: 11.1780 },
            { id: 'SN3200', name: 'Baterød', lat: 59.3072, lon: 11.1338 }
        ];

        // --- SMARTEMBED LOGIKK ---
        function sendHeightToParent() {
            // Finner total høyde på innholdet og sender det til avissiden
            const height = document.body.scrollHeight;
            window.parent.postMessage({ type: 'resize', height: height }, '*');
        }

        function triggerResize() {
            sendHeightToParent();
            // Animasjonen tar litt tid (0.3s), så vi sender høyden en gang til etter den er ferdig
            setTimeout(sendHeightToParent, 350); 
        }
        
        window.addEventListener('load', sendHeightToParent);
        window.addEventListener('resize', sendHeightToParent);
        // -------------------------

        // Hjelpefunksjon for å oversette Yr-symboler til våre ikoner
        function getIconFromSymbol(symbolCode) {
            if (!symbolCode) return 'cloud';
            const base = symbolCode.split('_')[0];
            if (base.includes('clear') || base.includes('fair')) return 'sun';
            if (base.includes('partly')) return 'cloud-sun';
            if (base.includes('rain')) return 'cloud-rain';
            if (base.includes('heavyrain')) return 'cloud-lightning';
            if (base.includes('snow') || base.includes('sleet')) return 'snowflake';
            return 'cloud';
        }

        // Funksjon for å åpne/lukke varselet (kalles når man klikker på raden)
        window.toggleForecast = function(id) {
            const dropdown = document.getElementById(`forecast-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            
            if (dropdown.classList.contains('open')) {
                dropdown.classList.remove('open');
                chevron.classList.remove('rotate-180');
            } else {
                dropdown.classList.add('open');
                chevron.classList.add('rotate-180');
            }
            // NYTT: Be iframen om å oppdatere høyden sin når vi bretter ut!
            triggerResize();
        };

        async function fetchAllWeatherData() {
            try {
                const weatherListEl = document.getElementById('weather-list');
                weatherListEl.innerHTML = ''; // Tømmer listen

                // Henter data for alle stasjoner parallelt
                const fetchPromises = stations.map(async (station) => {
                    let temp = '--';
                    let wind = '--';
                    let precip = '--';
                    let icon = 'cloud';
                    let forecastHtml = '';

                    // FORSØK 1: Hent Locationforecast (brukes til regn og timesvarsel)
                    try {
                        const fallbackUrl = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${station.lat}&lon=${station.lon}`;
                        const fallbackResponse = await fetch(fallbackUrl);
                        
                        if (fallbackResponse.ok) {
                            const fallbackData = await fallbackResponse.json();
                            const timeseries = fallbackData.properties.timeseries;
                            const currentData = timeseries[0].data;
                            
                            // Setter basisverdier
                            if (currentData.instant.details.air_temperature !== undefined) temp = currentData.instant.details.air_temperature.toFixed(1);
                            if (currentData.instant.details.wind_speed !== undefined) wind = currentData.instant.details.wind_speed.toFixed(1);
                            if (currentData.next_1_hours.details.precipitation_amount !== undefined) precip = currentData.next_1_hours.details.precipitation_amount.toFixed(1);
                            
                            icon = getIconFromSymbol(currentData.next_1_hours.summary.symbol_code);

                            // Bygger fremtidsvarselet (de neste 5 timene)
                            let upcomingHoursHtml = '';
                            // Vi starter på index 1 (neste time) og henter 5 timer frem
                            for(let i = 1; i <= 5; i++) {
                                if(timeseries[i]) {
                                    const tData = timeseries[i].data;
                                    const timeObj = new Date(timeseries[i].time);
                                    const hourStr = timeObj.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
                                    const fTemp = tData.instant.details.air_temperature.toFixed(0);
                                    const fSym = tData.next_1_hours ? tData.next_1_hours.summary.symbol_code : (tData.next_6_hours ? tData.next_6_hours.summary.symbol_code : '');
                                    const fIcon = getIconFromSymbol(fSym);

                                    upcomingHoursHtml += `
                                        <div class="flex flex-col items-center justify-center p-2 min-w-[60px]">
                                            <span class="text-xs text-gray-500 mb-1.5">${hourStr}</span>
                                            <i data-lucide="${fIcon}" class="w-6 h-6 text-[#e3000f] mb-1.5"></i>
                                            <span class="text-sm font-bold text-gray-800">${fTemp}°</span>
                                        </div>
                                    `;
                                }
                            }
                            forecastHtml = `<div class="flex justify-between overflow-x-auto no-scrollbar">${upcomingHoursHtml}</div>`;
                        }
                    } catch (fallbackError) {
                        console.error(`Klarte ikke hente varsel for ${station.name}:`, fallbackError);
                        icon = 'alert-triangle';
                        forecastHtml = '<p class="text-xs text-red-500">Kunne ikke laste timevarsel.</p>';
                    }

                    // FORSØK 2: Oppgrader med fysisk måling fra Frost API for selve hovedvisningen
                    try {
                        const apiUrl = `https://frost.met.no/observations/v0.jsonld?sources=${station.id}&referencetime=latest&elements=air_temperature,wind_speed`;
                        // Setter sammen ID og Secret for Basic Auth
                        const authString = btoa(frostId + ':' + frostSecret);
                        const response = await fetch(apiUrl, {
                            headers: { 'Authorization': 'Basic ' + authString }
                        });

                        if (response.ok) {
                            const result = await response.json();
                            const stationData = result.data && result.data.length > 0 ? result.data[0] : null;

                            if (stationData && stationData.observations) {
                                const tempObs = stationData.observations.find(o => o.elementId === 'air_temperature');
                                const windObs = stationData.observations.find(o => o.elementId === 'wind_speed');
                                
                                if (tempObs) temp = tempObs.value.toFixed(1);
                                if (windObs) wind = windObs.value.toFixed(1);
                            }
                        }
                    } catch (error) {
                        console.warn(`Kunne ikke hente Frost-data for ${station.name}, beholder varselet.`);
                    }

                    return { ...station, temp, wind, precip, icon, forecastHtml };
                });

                const results = await Promise.all(fetchPromises);

                // Bygger HTML for hele listen
                results.forEach(res => {
                    const rowHtml = `
                        <div class="flex flex-col w-full bg-white group">
                            <!-- Hovedrad (Klikkbar) -->
                            <button onclick="toggleForecast('${res.id}')" class="w-full flex items-center justify-between p-4 hover:bg-gray-50 focus:bg-gray-50 transition-colors focus:outline-none cursor-pointer">
                                <div class="flex items-center space-x-4">
                                    <div class="text-[#e3000f] flex-shrink-0">
                                        <i data-lucide="${res.icon}" class="w-8 h-8"></i>
                                    </div>
                                    <div class="text-left">
                                        <h3 class="font
