<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarpsborg Værrigg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 3s linear infinite; }
        
        .forecast-dropdown {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.3s ease-out;
        }
        .forecast-dropdown.open {
            grid-template-rows: 1fr;
        }
        .forecast-inner {
            overflow: hidden;
        }
        
        /* Skjul scrollbar men behold funksjonalitet */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-transparent flex items-center justify-center min-h-screen p-0 m-0 w-full overflow-hidden font-sans">

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full max-w-md overflow-hidden">
        
        <!-- Topptekst -->
        <div class="bg-white border-b-4 border-[#e3000f] px-5 py-4">
            <div class="flex justify-between items-center">
                <!-- Fallback SA-logo -->
                <svg viewBox='0 0 80 40' class='h-8' aria-label="Sarpsborg Arbeiderblad logo" role="img" xmlns='http://www.w3.org/2000/svg'>
                    <text x='0' y='32' font-family='Georgia, serif' font-weight='900' font-size='38' fill='#e3000f'>S</text>
                    <text x='24' y='32' font-family='Georgia, serif' font-weight='900' font-size='44' fill='#e3000f'>a</text>
                    <circle cx='62' cy='30' r='5' fill='#1e293b'/>
                </svg>
                
                <div class="flex items-center text-[#e3000f]">
                    <i data-lucide="cloud-sun" class="w-5 h-5 mr-1.5" aria-hidden="true"></i>
                    <h2 class="text-xs font-bold tracking-wider text-gray-800 uppercase">Været nå</h2>
                </div>
            </div>
            <p class="text-gray-500 text-xs mt-2 font-medium" id="time-display">Henter værdata...</p>
        </div>

        <!-- Laster-status -->
        <div id="loading-state" class="p-8 text-center text-gray-500">
            <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin-slow mb-3 text-[#e3000f]"></i>
            <p class="text-sm">Henter ferske målinger for Sarpsborg...</p>
        </div>

        <!-- Hovedinnhold (Data) -->
        <div id="weather-list" class="hidden flex flex-col divide-y divide-gray-100 w-full">
            <!-- Innholdet genereres dynamisk av JavaScript -->
        </div>

        <!-- Kildehenvisning -->
        <div class="px-5 py-3 bg-gray-50 text-[10px] text-gray-500 text-center border-t border-gray-200">
            Værvarsel fra <a href="https://www.yr.no/nb/værvarsel/daglig-tabell/1-105152/Norge/Østfold/Sarpsborg/Sarpsborg" target="_blank" class="text-[#e3000f] font-medium hover:underline">Yr</a>, levert av Meteorologisk institutt og NRK.
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Disse byttes automatisk ut av GitHub Actions
        const frostId = '{{FROST-ID}}';
        const frostSecret = '{{FROST-SECRET}}';

        // Fysiske målestasjoner
        const stations = [
            { id: 'SN3190', name: 'Sarpsborg sentrum', lat: 59.2851, lon: 11.1128 },
            { id: 'SN3370', name: 'Kalnes', lat: 59.3193, lon: 11.0422 },
            { id: 'SN3003', name: 'E6 Solbergtårnet', lat: 59.2046, lon: 11.1780 },
            { id: 'SN3200', name: 'Baterød', lat: 59.3072, lon: 11.1338 }
        ];

        // Auto-resize for Smartembed
        function sendHeightToParent() {
            if (window.self === window.top) return;
            const height = document.body.scrollHeight;
            window.parent.postMessage({ type: 'resize', height: height }, '*');
        }
        window.addEventListener('load', sendHeightToParent);
        window.addEventListener('resize', sendHeightToParent);
        if ("ResizeObserver" in window) {
            new ResizeObserver(sendHeightToParent).observe(document.body);
        }

        function triggerResize() {
            sendHeightToParent();
            setTimeout(sendHeightToParent, 350); 
        }

        // Funksjon for å oversette Yr-symboler til Lucide-ikoner
        function getIconFromSymbol(symbolCode) {
            if (!symbolCode) return 'cloud';
            const base = symbolCode.split('_')[0];
            if (base.includes('clear') || base.includes('fair')) return 'sun';
            if (base.includes('partly')) return 'cloud-sun';
            if (base.includes('rain')) return 'cloud-rain';
            if (base.includes('heavyrain')) return 'cloud-lightning';
            if (base.includes('snow') || base.includes('sleet')) return 'snowflake';
            return 'cloud';
        }

        // Funksjon for å åpne/lukke varselet
        window.toggleForecast = function(id) {
            const dropdown = document.getElementById(`forecast-${id}`);
            const chevron = document.getElementById(`chevron-${id}`);
            const button = document.getElementById(`btn-${id}`);
            
            const isOpen = dropdown.classList.contains('open');
            
            if (isOpen) {
                dropdown.classList.remove('open');
                chevron.classList.remove('rotate-180');
                button.setAttribute('aria-expanded', 'false');
            } else {
                dropdown.classList.add('open');
                chevron.classList.add('rotate-180');
                button.setAttribute('aria-expanded', 'true');
            }
            triggerResize();
        };

        async function fetchAllWeatherData() {
            try {
                const weatherListEl = document.getElementById('weather-list');
                const fetchPromises = stations.map(async (station) => {
                    let temp = '--';
                    let wind = '--';
                    let precip = '--';
                    let icon = 'cloud';
                    let forecastHtml = '';

                    // 1: Hent Locationforecast (brukes til regn og timesvarsel)
                    try {
                        const fallbackUrl = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${station.lat}&lon=${station.lon}`;
                        const fallbackResponse = await fetch(fallbackUrl);
                        
                        if (fallbackResponse.ok) {
                            const fallbackData = await fallbackResponse.json();
                            const timeseries = fallbackData.properties.timeseries;
                            const currentData = timeseries[0].data;
                            
                            if (currentData.instant.details.air_temperature !== undefined) temp = currentData.instant.details.air_temperature.toFixed(1);
                            if (currentData.instant.details.wind_speed !== undefined) wind = currentData.instant.details.wind_speed.toFixed(1);
                            if (currentData.next_1_hours && currentData.next_1_hours.details.precipitation_amount !== undefined) {
                                precip = currentData.next_1_hours.details.precipitation_amount.toFixed(1);
                            }
                            
                            icon = getIconFromSymbol(currentData.next_1_hours ? currentData.next_1_hours.summary.symbol_code : '');

                            // Bygger fremtidsvarselet (neste 5 timer)
                            let upcomingHoursHtml = '';
                            for(let i = 1; i <= 5; i++) {
                                if(timeseries[i]) {
                                    const tData = timeseries[i].data;
                                    const timeObj = new Date(timeseries[i].time);
                                    const hourStr = timeObj.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
                                    const fTemp = tData.instant.details.air_temperature.toFixed(0);
                                    const fSym = tData.next_1_hours ? tData.next_1_hours.summary.symbol_code : (tData.next_6_hours ? tData.next_6_hours.summary.symbol_code : '');
                                    const fIcon = getIconFromSymbol(fSym);

                                    upcomingHoursHtml += `
                                        <div class="flex flex-col items-center justify-center p-2 min-w-[55px]">
                                            <span class="text-[10px] text-gray-500 mb-1 font-medium">${hourStr}</span>
                                            <i data-lucide="${fIcon}" class="w-5 h-5 text-[#e3000f] mb-1"></i>
                                            <span class="text-sm font-bold text-gray-800">${fTemp}°</span>
                                        </div>
                                    `;
                                }
                            }
                            forecastHtml = upcomingHoursHtml;
                        }
                    } catch (fallbackError) {
                        console.error(`Klarte ikke hente Yr-varsel for ${station.name}:`, fallbackError);
                        icon = 'alert-triangle';
                        forecastHtml = '<p class="text-xs text-red-500">Kunne ikke laste timevarsel.</p>';
                    }

                    // 2: Hent ferske Frost-observasjoner (overskriver Yr for temp/vind hvis de finnes)
                    try {
                        const apiUrl = `https://frost.met.no/observations/v0.jsonld?sources=${station.id}&referencetime=latest&elements=air_temperature,wind_speed`;
                        const authString = btoa(frostId + ':' + frostSecret);
                        const response = await fetch(apiUrl, {
                            headers: { 'Authorization': 'Basic ' + authString }
                        });

                        if (response.ok) {
                            const result = await response.json();
                            const stationData = result.data && result.data.length > 0 ? result.data[0] : null;

                            if (stationData && stationData.observations) {
                                const tempObs = stationData.observations.find(o => o.elementId === 'air_temperature');
                                const windObs = stationData.observations.find(o => o.elementId === 'wind_speed');
                                
                                if (tempObs) temp = tempObs.value.toFixed(1);
                                if (windObs) wind = windObs.value.toFixed(1);
                            }
                        }
                    } catch (error) {
                        console.warn(`Kunne ikke hente Frost-data (sikkert pga manglende nøkkel i forhåndsvisning), bruker Yr-tall for ${station.name}.`);
                    }

                    return { ...station, temp, wind, precip, icon, forecastHtml };
                });

                const results = await Promise.all(fetchPromises);
                let html = '';

                results.forEach(res => {
                    html += `
                        <div class="flex flex-col w-full bg-white group">
                            <button id="btn-${res.id}" aria-expanded="false" aria-controls="forecast-${res.id}" onclick="toggleForecast('${res.id}')" class="w-full flex items-center justify-between px-5 py-4 hover:bg-gray-50 focus:bg-gray-50 transition-colors focus:outline-none focus:ring-2 focus:ring-inset focus:ring-[#e3000f] cursor-pointer">
                                
                                <div class="flex items-center space-x-4">
                                    <div class="text-[#e3000f] flex-shrink-0">
                                        <i data-lucide="${res.icon}" class="w-7 h-7"></i>
                                    </div>
                                    <div class="text-left">
                                        <h3 class="font-bold text-gray-800 text-sm md:text-base">${res.name}</h3>
                                        <div class="flex flex-col sm:flex-row text-xs text-gray-500 sm:space-x-3 mt-0.5 space-y-1 sm:space-y-0">
                                            <span class="flex items-center" title="Vindstyrke"><i data-lucide="wind" class="w-3 h-3 mr-1"></i>${res.wind} m/s</span>
                                            <span class="flex items-center" title="Nedbør neste time"><i data-lucide="droplets" class="w-3 h-3 mr-1"></i>${res.precip} mm</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex items-center space-x-3">
                                    <span class="text-2xl font-black text-gray-900">${res.temp}°</span>
                                    <div class="bg-gray-100 rounded-full p-1 group-hover:bg-gray-200 transition-colors">
                                        <i id="chevron-${res.id}" data-lucide="chevron-down" class="w-4 h-4 text-gray-500 transition-transform duration-300"></i>
                                    </div>
                                </div>
                            </button>

                            <div id="forecast-${res.id}" class="forecast-dropdown bg-[#f8f9fa] border-t border-gray-100">
                                <div class="forecast-inner">
                                    <div class="px-4 py-3">
                                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 pl-2">Varsel neste 5 timer</p>
                                        <div class="flex justify-between overflow-x-auto no-scrollbar pb-2">
                                            ${res.forecastHtml}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                weatherListEl.innerHTML = html;
                lucide.createIcons(); 

                // Bytt ut laster med data
                document.getElementById('loading-state').classList.add('hidden');
                weatherListEl.classList.remove('hidden');

                const nå = new Date();
                const tid = nå.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('time-display').innerText = `Sist oppdatert kl. ${tid}`;

                triggerResize();

            } catch (error) {
                console.error("Generell feil:", error);
                document.getElementById('loading-state').innerHTML = `<p class="text-red-500 text-sm">Kunne ikke laste værdata akkurat nå. Prøv igjen senere.</p>`;
            }
        }

        // Kjør i gang!
        fetchAllWeatherData();
    </script>
</body>
</html>
